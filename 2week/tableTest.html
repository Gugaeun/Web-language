<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>테이블 예시 연습</title>
</head>
<body>
    <!--4행 3열의 테이블 만들기-->
    <table border>
        <!--caption 은 상단 제목을 만듬-->
        <caption>테이블 제목</caption> 
        <thead>
        <tr>
            <th>1행 1열</th>
            <th>1행 2열</th>
            <th>1행 3열</th>
        </tr>
        </thead>    
        <tbody>
        <tr>
            <td>2행 1열</td>
            <td colspan="2">2행 2열</td><!--colspan 은 가로 방향, 열 병합-->
            <!--<td>2행 3열</td>-->
        </tr>
         <tr>
            <td rowspan="2">3행 1열</td> <!--rowspan 은 세로 병합, 행 병합-->
            <td>3행 2열</td>
            <td>3행 3열</td>
        </tr>
        <tr>
            <!--<td>4행 1열</td>-->
            <td>4행 2열</td>
            <td>4행 3열</td>
        </tr>
        </tbody>
    </table>

    <table border>
        <caption>[표 1] 선물용과 가정용 상품 가격표</caption>
        <thead>
            <tr>
                <th>용도</th>
                <th>중량</th>
                <th>가격</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td rowspan="2">선물용</td>
                <td>3kg</td>
                <td>25,000원</td>
            </tr>
            <tr>
                <!--<td></td>-->
                <td>5kg</td>
                <td>40,000원</td>
            </tr>
            <tr>
                <td colspan="3">&nbsp**가정용 상품은 현재 품절입니다.**&nbsp</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
