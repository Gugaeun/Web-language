<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8">
    <title>letter-spacing</title>
    <style>  
      p {
        font-size:20px;
      }
      /* Do it! 글자 간격 조절하기 */
     .spacing1 {
      letter-spacing: 0.2em;
     }
     .spacing2 {
      letter-spacing: 0.5em;
     }
    </style>
  </head>
  <body>
    <p>CSS : Cascading Stsyle sheet</p>
    <p style="letter-spacing: 0.2em; word-spacing: 0.5em;">CSS : Cascading Stsyle sheet</p> 
    <p class="spacing1">CSS</p>
    <p class="spacing2">CSS</p>
  </body>
</html>
