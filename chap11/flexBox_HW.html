<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>플렉스 박스</title>
    <style>
        .container {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #ccc;
            padding: 10px;
            position: relative;
        }

        .logo {
            background: yellow;
            padding: 10px 15px;
            font-weight: bold;
            color: rgb(248, 80, 80);
            
        }
        .title {
            flex: 1;
            text-align: center;
        }

        .menu {
            display: flex;
            gap: 15px;
            margin-left: auto;
        }
        .menu span{
            font-size: 14px;
            color: #333;
        }
        .main {
            display: flex;
            gap: 20px;
        }
        .left {
            flex: 3;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .post {
            background: #eee;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }
        .right {
            flex: 1;
            background: #ddd;
            padding: 20px;
            border-radius: 10px;
        }
        .footer {
            background: #ccc;
            text-align: center;
            padding: 20px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">

  <header class="header">
    <div class="logo">로고</div>
    <div class="title">Header</div>
    <nav class="menu">
      <span>메뉴1</span>
      <span>메뉴1</span>
      <span>메뉴1</span>
    </nav>
  </header>

  <main class="main">
    <div class="left">
      <div class="post">첫 번째 포스트</div>
      <div class="post">두 번째 포스트</div>
      <div class="post">세 번째 포스트</div>
    </div>

    <aside class="right">
      Right Content (Sidebar)
    </aside>
  </main>

  <footer class="footer">
    Footer
  </footer>

</div>
</body>
</html>
