<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>박스모델</title>
    <style>
        body {
            margin: 10px auto;
        }
        div {
            width: 100px;
            height: 100px;
            border: 1px solid orange;
            display: inline-block;
        }
        .box1 {
            border-radius: 70%;
            background:orange;
            border: 2px solid black;
        }
        .box2 {
            border-top-right-radius: 60px 40px;
            border-bottom-left-radius: 60px 40px;
            border: 2px solid black;
            background: orange;
        }
        .box3 {
            border-radius: 20px;
            background: orange;
            border: 2px solid black;
        }
        .box4 {
            border-top-left-radius: 60px 40px;
            border-bottom-right-radius: 60px 40px;
            border: 2px solid black;
            background: orange;
        }
    </style>
</head>

<body>
    <div class="box1"></div>
    <div class="box2"></div>
    <div class="box3"></div>
    <div class="box4"></div>
</body>
</html>
