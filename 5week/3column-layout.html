<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2단 레이아웃 두 번째</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
       #wrapper {
        width: 1200px;
        border: 1px solid gray; 
       }
       #header {
        width: 100%;
        height: 120px;
        background: #ccc;
       }
       #sidebar1 {
        width: 250px;
        height: 600px;
        background: #aaa;
        float: left;
       }
       #sidebar2 {
        width: 150px;
        height: 600px;
        background: #aaa;
        float: right;
       }
       #contents {
        width: 798px;
        height: 600px;
        background: #646464;
        float: left;
       }
       #footer {
        width: 100%;
        height: 100px;
        background: #353535;
        clear: both;
       }
    </style>
</head>
<body>
    <div id="wrapper">
        <div id="header">헤더</div>
        <div id="sidebar1">사이드바 왼쪽</div>
        <div id="contents">본문</div>
        <div id="sidebar2">사이드바 오른쪽</div>
        <div id="footer">푸터</div>
        
    </div>
</body>
</html>
