<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        span {
            display: block;
            width: 100px;
            height: 60px;
            border: 1px solid gray;
        }
        div div {
            display: inline;
            width: 400px;
            height: 60px;
            border: 1px solid gray;
        }
    </style>
</head>
<body>
    <div>
        <span>block span</span> 과
        <span>block span</span> 입니다.
    </div>
    <div style="background: orange">
        <div>inline DIV</div>
        <div>inline DIV</div>
        <div>inline DIV</div>

    </div>

</body>
</html>
