<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>레드향 주문하기</title>
</head>
<body>
  <h1>레드향 주문하기</h1>
  <form>
    <fieldset>
      <legend>주문자 정보</legend> 
      주문자 ID :<input type="number" min="10" max="20">

    </fieldset>
    <fieldset>
      <legend>상품 선택</legend>
      <!-- Do it! 스핀 박스를 사용해 숫자 입력하기 -->
      <p><b>주문할 상품을 선택해 주세요.</b></p>
      <ul>
        <li>
          <input type="checkbox" id="p5"><label for="p5">선물용 3kg
            <input type="number" min="1" max="5" value="1">(개)(최대 5개)
          </label>
        </li>
         <li>
          <input type="checkbox" id="p3"><label for="p3">선물용 5kg
            <input type="number" min="1" max="5" value="1">(개)(최대 5개)
          </label>
        </li>
         <li>
          <input type="checkbox" id="p3"><label for="p3">가정용 3kg
            <input type="number" min="1" max="5" value="1">(개)(최대 5개)
          </label>
        </li>
         <li>
          <input type="checkbox" id="f5"><label for="f5">가정용 5kg
            <input type="number" min="1" max="5" value="1">(개)(최대 5개)
          </label>
         </li>
       </ul>
       <p><b>포장 선택</b></p>
       <ul>
        <li>
          <input type="radio" name="gift">선물 포장
        </li> 
        <li>
          <input type="radio" name="gift1">포장 안함
        </li>
       </ul>
      <p><b>포장 선택</b></p>
           
    </fieldset>
    <fieldset>
      <legend>배송 정보</legend>
      <ul>
        <li>
          <label for="user-name">이름 </label>
          <input type="text" id="user-name">
        </li>
        <li>
          <label for="addr">배송 주소</label>
          <input type="text" id="addr">
        </li>
        <li>
          <label for="mail">메일 주소</label>
          <input type="email" id="mail">
        </li>        
        <li>
          <label for="phone">연락처</label>
          <input type="tel" id="phone">
        </li>
      </ul>  
    </fieldset>      
  </form>
</body>
</html>
